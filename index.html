<!DOCTYPE html>

<title>BigNetwork</title>

</head>

<body>

<header>
<h1>🚀 BigNetwork</h1>

<div class="card">

</div>

<button id="boxBtn">Open Mystery Box</button>

<p id="dailyTimer">Ready</p>
<button id="dailyBtn">Claim Reward</button>
</div>

<button class="menu">👥 Invite Friends</button>
